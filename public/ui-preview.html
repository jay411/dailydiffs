<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DailyDiffs — UI Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
  <div id="view-home" class="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-b from-slate-50 to-slate-100">
    <main class="flex flex-col items-center gap-8 max-w-md w-full">
      <h1 class="text-4xl font-bold text-slate-800 tracking-tight">DailyDiffs</h1>
      <p class="text-slate-600 text-center">Spot the difference. 5 new puzzles every day at 8 AM.</p>
      <a href="#view-play" class="w-full rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 px-6 text-center transition-colors shadow-lg">
        Play Today's Puzzle
      </a>
      <div class="flex gap-6 text-sm text-slate-500">
        <span>Streak: —</span>
        <span>Next puzzle: 8 AM</span>
      </div>
    </main>
  </div>

  <div id="view-play" class="min-h-screen flex flex-col bg-slate-50 hidden">
    <header class="flex items-center justify-between p-4 border-b border-slate-200">
      <a href="#view-home" class="text-lg font-semibold text-slate-800">DailyDiffs</a>
      <span class="text-slate-600">Round 1/5 · cartoon</span>
      <div class="flex items-center gap-4">
        <span class="tabular-nums font-medium">00:23</span>
        <span class="text-slate-600">2/5 found</span>
      </div>
    </header>
    <main class="flex-1 flex flex-col items-center p-4 gap-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-4xl">
        <div class="relative aspect-video w-full bg-slate-200 rounded-lg overflow-hidden flex items-center justify-center text-slate-500">
          Original
        </div>
        <div class="relative aspect-video w-full bg-slate-200 rounded-lg overflow-hidden flex items-center justify-center text-slate-500">
          Modified
        </div>
      </div>
      <div class="flex gap-2">
        <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
        <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
        <span class="w-3 h-3 rounded-full bg-slate-300"></span>
        <span class="w-3 h-3 rounded-full bg-slate-300"></span>
        <span class="w-3 h-3 rounded-full bg-slate-300"></span>
      </div>
    </main>
  </div>

  <script>
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', function(e) {
        e.preventDefault();
        const id = this.getAttribute('href').slice(1);
        document.getElementById('view-home').classList.toggle('hidden', id !== 'view-home');
        document.getElementById('view-play').classList.toggle('hidden', id !== 'view-play');
      });
    });
  </script>
</body>
</html>
